name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: deno install
      - run: deno task build:css
      - name: Verify built CSS is up to date
        run: git diff --exit-code src/assets/style.css
      - run: deno fmt --check
      - run: deno lint
      - run: deno check src/**/*.ts
      - run: deno test --allow-read
      - run: npx deno-test
